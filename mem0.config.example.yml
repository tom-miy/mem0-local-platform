vector_store:
  provider: qdrant
  config:
    host: qdrant
    port: 6333
    collection_name: developer_memories
    embedding_model_dims: 1024

graph_store:
  provider: falkordb
  config:
    url: redis://falkordb:6379

llm:
  provider: ollama
  config:
    model: qwen3.5:4b
    temperature: 0.1
    ollama_base_url: http://ollama:11434

embedder:
  provider: ollama
  config:
    model: bge-m3
    ollama_base_url: http://ollama:11434
