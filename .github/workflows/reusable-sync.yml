name: Reusable mem0 Sync

on:
  workflow_call:
    inputs:
      sync_mode:
        description: Use changed for push diffs or full for complete repository indexing.
        required: false
        type: string
        default: changed
      tenant:
        description: Tenant security boundary to write into.
        required: false
        type: string
        default: secret-knowledge
      repo:
        description: Repository metadata name. Defaults to owner/repo basename.
        required: false
        type: string
        default: ""
      platform_repository:
        description: Repository that contains the reusable sync implementation.
        required: false
        type: string
        default: tom-miy/mem0-local-platform
      platform_ref:
        description: Ref for the platform repository checkout.
        required: false
        type: string
        default: main
      sync_config_file:
        description: Path in the source repository containing mem0 sync path rules.
        required: false
        type: string
        default: .mem0-sync.yml
    secrets:
      MEM0_API_URL:
        required: true
      MEM0_API_KEY:
        required: false
      MEM0_CLOUDFLARE_ACCESS_CLIENT_ID:
        required: true
      MEM0_CLOUDFLARE_ACCESS_CLIENT_SECRET:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: source
          fetch-depth: 0

      - name: Checkout mem0-local-platform
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ inputs.platform_repository || github.repository }}
          ref: ${{ inputs.platform_ref || github.ref_name }}
          path: platform

      - name: Set up uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Install platform dependencies
        working-directory: platform
        shell: bash
        run: uv sync --no-dev

      - name: Write path rules
        working-directory: platform
        env:
          SYNC_CONFIG_FILE: ${{ inputs.sync_config_file }}
        shell: bash
        run: |
          set -euo pipefail
          .venv/bin/python -m scripts.sync_path_rules \
            --source-root ../source \
            --platform-root . \
            --config-file "$SYNC_CONFIG_FILE" \
            --include-output "$RUNNER_TEMP/include-paths.txt" \
            --exclude-output "$RUNNER_TEMP/exclude-paths.txt"

      - name: Detect files to sync
        working-directory: source
        env:
          SYNC_MODE: ${{ inputs.sync_mode }}
        shell: bash
        run: |
          set -euo pipefail
          write_changed_files() {
            local base_ref="$1"
            local head_ref="$2"
            local status_file="$RUNNER_TEMP/sync-name-status.txt"
            : > "$RUNNER_TEMP/sync-files.txt"
            git diff --name-status --diff-filter=ACMRD "$base_ref" "$head_ref" > "$status_file"
            while IFS=$'\t' read -r status path_a path_b; do
              if [ -z "$status" ]; then
                continue
              fi
              if [[ "$status" == R* ]]; then
                printf '%s\n' "$path_a" "$path_b" >> "$RUNNER_TEMP/sync-files.txt"
              else
                printf '%s\n' "$path_a" >> "$RUNNER_TEMP/sync-files.txt"
              fi
            done < "$status_file"
          }

          if [ "$SYNC_MODE" = "full" ]; then
            git ls-files > "$RUNNER_TEMP/sync-files.txt"
          elif [ "$SYNC_MODE" = "changed" ]; then
            if [ -n "${{ github.event.before || '' }}" ] &&
               [ "${{ github.event.before || '' }}" != "0000000000000000000000000000000000000000" ]; then
              write_changed_files "${{ github.event.before }}" "$GITHUB_SHA"
            elif git rev-parse HEAD^ >/dev/null 2>&1; then
              write_changed_files HEAD^ HEAD
            else
              git ls-files > "$RUNNER_TEMP/sync-files.txt"
            fi
          else
            echo "sync_mode must be 'changed' or 'full': $SYNC_MODE" >&2
            exit 2
          fi

      - name: Sync files to mem0
        working-directory: platform
        env:
          MEM0_API_URL: ${{ secrets.MEM0_API_URL }}
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.MEM0_CLOUDFLARE_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.MEM0_CLOUDFLARE_ACCESS_CLIENT_SECRET }}
          TENANT: ${{ inputs.tenant || 'secret-knowledge' }}
          REPO_NAME: ${{ inputs.repo || github.event.repository.name }}
        shell: bash
        run: |
          set -euo pipefail
          .venv/bin/python -m scripts.ingest_repo \
            --root ../source \
            --tenant "$TENANT" \
            --repo "$REPO_NAME" \
            --changed-files-file "$RUNNER_TEMP/sync-files.txt" \
            --include-from "$RUNNER_TEMP/include-paths.txt" \
            --exclude-from "$RUNNER_TEMP/exclude-paths.txt"
