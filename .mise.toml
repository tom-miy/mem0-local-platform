[tools]
python = "3.13"
uv = "latest"

[env]
UV_CACHE_DIR = "{{config_root}}/.cache/uv"
PYTHONPYCACHEPREFIX = "{{config_root}}/.cache/pycache"

[tasks.setup]
description = "Install Python dependencies with uv."
run = "uv sync --no-dev"

[tasks.test]
description = "Run unit tests."
depends = ["setup"]
run = "uv run python -m unittest discover -s tests"

[tasks.compile]
description = "Compile Python sources without writing __pycache__ into source directories."
run = "PYTHONPYCACHEPREFIX=.cache/pycache python -m compileall scripts mem0_local_platform_api mem0_local_platform_mcp mcp tests"

[tasks.ingest-dry-run]
description = "Dry-run repository ingestion and print chunk payloads."
depends = ["setup"]
run = """
uv run python -m scripts.ingest_repo \
  --root . \
  --repo mem0-local-platform \
  --changed-files \
    README.md \
    docs/architecture/memory-model.md \
    docs/conventions/repository-indexing.md \
    docs/security/cloudflare-access.md \
    docs/operations/backup.md \
  --dry-run \
  --json
"""

[tasks.remember-help]
description = "Show ad-hoc memory CLI help for local tools."
depends = ["setup"]
run = "uv run remember-to-mem0 --help"

[tasks.workflow-check]
description = "Parse GitHub workflow YAML files."
depends = ["setup"]
run = "uv run python -c \"import yaml; yaml.safe_load(open('.github/workflows/reusable-sync.yml')); yaml.safe_load(open('.github/workflows/sync-memory.yml')); print('workflow yaml ok')\""

[tasks.check]
description = "Run local validation checks."
depends = ["compile", "test", "workflow-check", "ingest-dry-run"]

[tasks.clean]
description = "Remove local test and validation artifacts except data/."
run = """
rm -rf .cache
find scripts mem0_local_platform_api mem0_local_platform_mcp mcp tests \
  -name __pycache__ -type d -prune -exec rm -rf {} +
"""

[tasks.clean-data]
description = "Remove local runtime data created by compose or integration tests."
run = "rm -rf data"

[tasks.clean-all]
description = "Remove validation artifacts, runtime data, and the Python virtual environment."
depends = ["clean", "clean-data"]
run = "rm -rf .venv"

[tasks.distclean]
description = "Remove local test artifacts and the Python virtual environment. Keeps data/."
depends = ["clean"]
run = "rm -rf .venv"

[tasks.compose-config]
description = "Render Docker Compose config. Requires Docker Compose v2."
run = "docker compose -f compose.yml config"

[tasks.up]
description = "Start the local compose runtime. Requires Docker Compose v2."
run = "docker compose -f compose.yml up"

[tasks.down]
description = "Stop the local compose runtime. Requires Docker Compose v2."
run = "docker compose -f compose.yml down"
