include:
  - README.md
  - README*.md
  - docs/*.md
  - docs/**/*.md
  - adr/*.md
  - adr/**/*.md
  - adrs/*.md
  - adrs/**/*.md

exclude:
  - .git/**
  - .venv/**
  - node_modules/**
  - "**/node_modules/**"
  - dist/**
  - "**/dist/**"
  - vendor/**
  - "**/vendor/**"
  - coverage/**
  - "**/coverage/**"
  - build/**
  - "**/build/**"
  - __pycache__/**
  - "**/__pycache__/**"
  - "*.pyc"
  - "**/*.pyc"
  - "*.lock"
  - "**/*.lock"
  - package-lock.json
  - "**/package-lock.json"
  - pnpm-lock.yaml
  - "**/pnpm-lock.yaml"
  - yarn.lock
  - "**/yarn.lock"
  - "**/*.pdf"
  - "**/*.xls"
  - "**/*.xlsx"
  - "**/*.doc"
  - "**/*.docx"
  - "**/*.ppt"
  - "**/*.pptx"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.webp"
  - "**/*.svg"
  - "**/*.ico"
  - "**/*.zip"
  - "**/*.tar"
  - "**/*.tar.gz"
  - "**/*.tgz"
  - "**/*.7z"
  - "**/*.rar"
  - "**/*.mp3"
  - "**/*.mp4"
  - "**/*.mov"
  - "**/*.wav"
